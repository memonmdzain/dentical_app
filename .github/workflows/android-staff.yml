name: Android Staff CI

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'android/staff/**'
  pull_request:
    branches:
      - develop
      - main
    paths:
      - 'android/staff/**'

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/staff/**/*.gradle*', 'android/staff/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Verify Supabase secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          MISSING=0
          if [ -z "$SUPABASE_URL" ]; then
            echo "ERROR: SUPABASE_URL secret is not set or empty"
            MISSING=1
          else
            echo "SUPABASE_URL is set (${#SUPABASE_URL} chars)"
          fi
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "ERROR: SUPABASE_ANON_KEY secret is not set or empty"
            MISSING=1
          else
            echo "SUPABASE_ANON_KEY is set (${#SUPABASE_ANON_KEY} chars)"
          fi
          if [ $MISSING -eq 1 ]; then
            echo "Go to: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Build Debug APK
        working-directory: android/staff
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: gradle assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dentical-staff-debug-apk
          path: android/staff/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
